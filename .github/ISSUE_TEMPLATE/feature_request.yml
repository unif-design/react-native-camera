name: 功能建议
description: 提议一个新功能 / 改进
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        感谢使用 `@unif/react-native-camera`!请尽量详细描述需求,方便我们评估优先级。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过 [issues](https://github.com/unif-design/react-native-camera/issues),没有相似建议
          required: true
        - label: 我已查过 [README](https://github.com/unif-design/react-native-camera#readme),确认功能不存在
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决什么问题?
      description: 描述当前你在用 useCamera() 时遇到的限制 / 痛点。
      placeholder: |
        例:目前 cameraMode 不支持指定输出像素,业务希望 1080p 视频 + 720p 照片同时存在。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的 API / 行为
      description: 给出最小可工作的 TypeScript / JSX 示例。如果只是描述行为也 OK。
      render: tsx
      placeholder: |
        const [api, holder] = useCamera();
        await api.open({
          cameraMode: [
            { mode: 'single', resolution: { width: 1280, height: 720 } },
            { mode: 'video', resolution: { width: 1920, height: 1080 } },
          ],
          dataRetainedMode: 'clear',
        });

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 比如:消费方自己包一层?切换到 react-native-vision-camera 直接调?

  - type: dropdown
    id: priority
    attributes:
      label: 业务紧迫度
      options:
        - 'P3 - 想到的优化点,不阻塞'
        - 'P2 - 影响开发效率'
        - 'P1 - 阻塞当前业务'
      default: 0
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图 / 视频 / vision-camera 已有 API 链接等。
